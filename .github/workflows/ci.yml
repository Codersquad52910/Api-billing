# ============================================================
# API Billing Platform — CI/CD Pipeline
# ============================================================
# Multi-stage pipeline: Build → Test → Deploy
# Triggers on push to main and pull requests to main
# ============================================================

name: API Billing CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ── Environment Variables ────────────────────────────────────
env:
  NODE_VERSION: "20"
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/api-billing-platform

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: BUILD
  # Install dependencies and build frontend assets
  # ════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: 📂 Install root dependencies
        run: npm install

      - name: 📂 Install backend dependencies
        run: cd backend && npm ci

      - name: 📂 Install frontend dependencies
        run: cd frontend && npm ci

      - name: 📂 Install admin frontend dependencies
        run: cd admin-frontend && npm ci

      - name: 🔨 Build user frontend
        run: cd frontend && npm run build

      - name: 🔨 Build admin frontend
        run: cd admin-frontend && npm run build

      - name: 📤 Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: 📤 Upload admin build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin-frontend/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # JOB 2: TEST
  # Run linting, syntax validation, and health checks
  # ════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: 📂 Install backend dependencies
        run: cd backend && npm ci

      - name: 📂 Install frontend dependencies
        run: cd frontend && npm ci

      - name: 📂 Install admin frontend dependencies
        run: cd admin-frontend && npm ci

      - name: 🔍 Lint frontend code
        run: cd frontend && npm run lint

      - name: 🔍 Lint admin frontend code
        run: cd admin-frontend && npm run lint

      - name: ✅ Validate backend syntax
        run: |
          echo "Validating backend JavaScript files..."
          for file in $(find backend -name "*.js" -not -path "*/node_modules/*"); do
            echo "  Checking: $file"
            node --check "$file"
          done
          echo "✅ All backend files passed syntax validation"

      - name: 🧪 Run project tests
        run: npm test
        env:
          NODE_ENV: test

  # ════════════════════════════════════════════════════════════
  # JOB 3: DEPLOY
  # Build Docker image, push to Docker Hub
  # Only runs on push to main (not on PRs)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: 📥 Download admin build artifacts
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: admin-frontend/dist/

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: 🚀 Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Deployment summary
        run: |
          echo "================================================"
          echo "🚀 DEPLOYMENT SUCCESSFUL"
          echo "================================================"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️ Tags:  ${{ steps.meta.outputs.tags }}"
          echo "📅 Time:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"
          echo ""
          echo "To run locally:"
          echo "  docker pull ${{ env.DOCKER_IMAGE }}:latest"
          echo "  docker compose up -d"
          echo "================================================"
