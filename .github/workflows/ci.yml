name: API Billing CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "20"

# =========================
# BUILD JOB
# =========================
jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          npm install
          cd backend && npm install
          cd ../frontend && npm install
          cd ../admin-frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend && npm run build
          cd ../admin-frontend && npm run build

# =========================
# TEST JOB
# =========================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Basic Test
        run: echo "Tests Passed ✅"

# =========================
# DEPLOY JOB
# =========================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t api-billing .

      - name: Simulated Deployment
        run: echo "Application Deployed Successfully 🚀"
